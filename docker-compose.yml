services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tgdigest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tgdigest}
      POSTGRES_DB: ${POSTGRES_DB:-tgdigest}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tgdigest} -d ${POSTGRES_DB:-tgdigest}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # One-shot: applies migrations + seeds prompts, then exits. The entrypoint does
  # the work (RUN_MIGRATIONS defaults to 1) and `true` makes the container exit 0.
  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    environment:
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
    command: ["true"]
    restart: "no"

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    environment:
      POSTGRES_HOST: db
      RUN_MIGRATIONS: "0"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - session:/data/session
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "tgdigest", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["tgdigest", "web"]
    env_file: .env
    environment:
      POSTGRES_HOST: db
      RUN_MIGRATIONS: "0"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${WEB_PORT:-8080}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Optional local LLM. Enable with: docker compose --profile ollama up -d
  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    # Uncomment to expose the API on the host, or to enable GPU passthrough.
    # ports:
    #   - "11434:11434"
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  pgdata:
  session:
  ollama:
