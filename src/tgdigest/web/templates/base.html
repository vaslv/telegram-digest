<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TelegramDigest</title>
  <script src="https://unpkg.com/htmx.org@2.0.4" crossorigin="anonymous"></script>
  <style>
    :root { --bg:#0f1115; --card:#171a21; --line:#272c36; --fg:#e6e8ee; --muted:#9aa3b2;
            --accent:#3b82f6; --ok:#22c55e; --warn:#f59e0b; --danger:#ef4444; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--fg);
           font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
    a { color:var(--accent); text-decoration:none; } a:hover { text-decoration:underline; }
    .topbar { display:flex; align-items:center; gap:18px; padding:12px 20px;
              background:var(--card); border-bottom:1px solid var(--line); }
    .topbar .brand { font-weight:600; color:var(--fg); }
    .topbar nav { display:flex; gap:14px; } .topbar .logout { margin-left:auto; color:var(--muted); }
    main { max-width:980px; margin:24px auto; padding:0 20px; }
    h1 { font-size:22px; margin:8px 0 16px; } h2 { font-size:17px; margin:24px 0 10px; color:var(--muted); }
    table { width:100%; border-collapse:collapse; background:var(--card);
            border:1px solid var(--line); border-radius:10px; overflow:hidden; }
    th,td { text-align:left; padding:9px 12px; border-bottom:1px solid var(--line); vertical-align:middle; }
    th { color:var(--muted); font-weight:500; font-size:13px; } tr:last-child td { border-bottom:0; }
    .mono { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; color:var(--muted); font-size:13px; }
    button { background:var(--accent); color:#fff; border:0; border-radius:8px;
             padding:7px 12px; font-size:13px; cursor:pointer; }
    button:hover { filter:brightness(1.08); }
    button.ghost { background:transparent; color:var(--fg); border:1px solid var(--line); }
    button.danger { background:var(--danger); }
    .actions { display:flex; gap:6px; } .actions form { margin:0; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:20px; }
    .narrow { max-width:360px; margin:60px auto; }
    input,textarea,select { width:100%; background:#0c0e12; color:var(--fg);
            border:1px solid var(--line); border-radius:8px; padding:8px 10px; font:inherit; }
    label { display:block; margin-bottom:12px; color:var(--muted); font-size:13px; }
    label input,label textarea { margin-top:5px; color:var(--fg); }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:0 18px; }
    .grid .full { grid-column:1/3; } label.check { display:flex; align-items:center; gap:8px; }
    label.check input { width:auto; margin:0; }
    .row { display:flex; gap:10px; margin:14px 0; } .row form { margin:0; }
    .status { display:flex; gap:18px; align-items:center; color:var(--muted);
              background:var(--card); border:1px solid var(--line); border-radius:10px;
              padding:10px 14px; margin-bottom:18px; font-size:13px; }
    .status .btn { margin-left:auto; }
    .search { display:flex; gap:8px; margin:10px 0 16px; max-width:480px; }
    .flashes { max-width:980px; margin:14px auto -6px; padding:0 20px; }
    .flash { background:#13351f; border:1px solid #1f5132; color:#b7f7c9;
             padding:9px 12px; border-radius:8px; margin-bottom:8px; }
    .error { background:#3a1620; border:1px solid #5c2230; color:#f7b7c2;
             padding:9px 12px; border-radius:8px; margin-bottom:12px; }
    .badge { color:var(--muted); font-size:12px; } pre.digest { white-space:pre-wrap; word-wrap:break-word;
             background:var(--card); border:1px solid var(--line); border-radius:10px; padding:16px; }
  </style>
</head>
<body hx-boost="true">
  <header class="topbar">
    <a class="brand" href="/">📋 TelegramDigest</a>
    {% if user %}
    <nav>
      <a href="/">Чаты</a>
      <a href="/dialogs">Диалоги</a>
      <a href="/digests">Дайджесты</a>
      <a href="/runs">Запуски</a>
      <a href="/errors">Ошибки</a>
    </nav>
    <a class="logout" href="/logout">Выйти</a>
    {% endif %}
  </header>
  {% if flashes %}<div class="flashes">{% for m in flashes %}<div class="flash">{{ m }}</div>{% endfor %}</div>{% endif %}
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
